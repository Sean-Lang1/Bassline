<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Bassline Globe</title>
<style>
body{
margin:0;
overflow:hidden;
background:
radial-gradient(circle at 50% 40%, #182033 0%, #050505 65%);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
}

:root{
--accent:#ffffff;
--glass:rgba(255,255,255,.10);
--border:rgba(255,255,255,.18);
--panel-bg:rgba(255,255,255,.08);
--accent-glow:rgba(255,255,255,.25);
--text-dim:rgba(255,255,255,.6);
}
#search{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;align-items:center;padding:12px 22px;border-radius:999px;background:var(--panel-bg);border:1px solid var(--accent-glow);box-shadow:0 0 20px var(--accent-glow)}
#searchBox{background:transparent;border:none;outline:none;color:white;width:240px;font-size:15px}
#artistCard{
position:absolute;
top:50%;
left:50%;
transform:
translate(-50%,-50%)
translateX(-430px);
width:230px;
padding:18px;
border-radius:24px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(30px);
box-shadow:
0 30px 80px rgba(0,0,0,.5);
}
#artistImage{
width:100%;
aspect-ratio:1;
object-fit:cover;
border-radius:18px;
margin-bottom:12px;
}
.hometown{color:var(--text-dim);font-size:13px;margin-bottom:12px}
#viewRelatedBtn{width:100%;padding:10px;border:none;border-radius:10px;background:var(--accent);color:white;font-weight:bold;cursor:pointer}
#relatedBubble{
position:absolute;
right:50px;
bottom:50px;
width:280px;
padding:16px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
}
.relatedRow{display:flex;gap:10px;padding:10px;margin-bottom:8px;background:rgba(255,255,255,.05);border-radius:10px;cursor:pointer}
.relatedRow:hover{background:rgba(255,255,255,.1)}
.relatedRow img{width:56px;height:56px;border-radius:8px;object-fit:cover}
#relatedTitle{
font-size:18px;
font-weight:bold;
margin-bottom:12px;
}
.relName{font-weight:bold}
.relType{display:inline-block;background:var(--accent);padding:2px 8px;border-radius:999px;font-size:11px}
.track{
display:flex;
align-items:center;
gap:8px;
margin-top:8px;
}

.track img{
width:35px;
height:35px;
border-radius:8px;
}
#recenterBtn{position:absolute;right:30px;bottom:30px;width:44px;height:44px;border-radius:50%;border:1px solid var(--accent-glow);background:var(--panel-bg);color:white;cursor:pointer}
#spinner{display:none;position:absolute;top:50%;left:50%;width:40px;height:40px;margin:-20px;border:4px solid var(--accent-glow);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div id="artistCard">
<img id="artistImage">
<h2 id="artistName"></h2>
<div id="artistHometown" class="hometown"></div>
<button id="viewRelatedBtn">View Related Artists</button>
</div>

<div id="relatedBubble">
<div id="relatedTitle">Connections</div>
<div id="relatedList"></div>
</div>

<div id="search">
<input id="searchBox" placeholder="Search an artist..." />
</div>

<button id="recenterBtn">&#8635;</button>
<div id="spinner"></div>
<canvas id="globe"></canvas>

<script type="importmap">
{
 "imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
 }
}
</script>

<script type="module">

import * as THREE from "three";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";

const API_BASE_URL="https://backend-ivory-gamma-74.vercel.app";

const canvas=document.getElementById("globe");

const renderer=new THREE.WebGLRenderer({
 canvas,
 antialias:true
});

renderer.setSize(
 window.innerWidth,
 window.innerHeight
);

renderer.setPixelRatio(
 window.devicePixelRatio
);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

const camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
.1,
1000
);

camera.position.set(0,0,3);

const controls=new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping=true;
controls.dampingFactor=.05;
controls.minDistance=1.3;
controls.maxDistance=8;

scene.add(
new THREE.AmbientLight(
0xffffff,
.7
)
);

const dirLight=new THREE.DirectionalLight(
0xffffff,
.8
);

dirLight.position.set(
5,
3,
5
);

scene.add(dirLight);

const starsGeometry=new THREE.BufferGeometry();
const starPositions=[];

for(let i=0;i<800;i++){
 const r=20;
 starPositions.push(
  (Math.random()-.5)*r,
  (Math.random()-.5)*r,
  (Math.random()-.5)*r
 );
}

starsGeometry.setAttribute(
"position",
new THREE.Float32BufferAttribute(
starPositions,
3
)
);

scene.add(
new THREE.Points(
starsGeometry,
new THREE.PointsMaterial({
 color:0xffffff,
 size:.03
})
)
);

// Earth

const earthMesh=
new THREE.Mesh(
 new THREE.SphereGeometry(1,64,64),
 new THREE.MeshBasicMaterial({
  color:0x02050f,
  transparent:true,
  opacity:.8
 })
);

scene.add(earthMesh);

function latLonToVector3(lat,lon,radius=1.01){

 const phi=(90-lat)*Math.PI/180;
 const theta=(lon+180)*Math.PI/180;

 return new THREE.Vector3(
  -radius*Math.sin(phi)*Math.cos(theta),
  radius*Math.cos(phi),
  radius*Math.sin(phi)*Math.sin(theta)
 );

}
// COUNTRY LINES

const countryGroup=new THREE.Group();
scene.add(countryGroup);

fetch("./geojson/countries.json")
.then(r=>r.json())
.then(json=>{

 const material=new THREE.LineBasicMaterial({
  color:0xffffff,
  transparent:true,
  opacity:.2
 });

 json.features.forEach(f=>{

  if(!f.geometry)
   return;

  let polygons=[];

  if(f.geometry.type==="Polygon")
   polygons=[f.geometry.coordinates];

  if(f.geometry.type==="MultiPolygon")
   polygons=f.geometry.coordinates;

  polygons.forEach(poly=>{

   poly.forEach(ring=>{

    const points=ring.map(p=>
     latLonToVector3(
      p[1],
      p[0],
      1.01
     )
    );

    countryGroup.add(
     new THREE.Line(
      new THREE.BufferGeometry()
      .setFromPoints(points),
      material
     )
    );

   });

  });

 });

})
 .catch(err=>{
  console.log("country data failed",err);
 });


// GRAPH

const nodesGroup=new THREE.Group();
scene.add(nodesGroup);

const linesGroup=new THREE.Group();
scene.add(linesGroup);

const nodeGeometry=new THREE.SphereGeometry(
.045,
16,
16
);


function clearGraph(){

 while(nodesGroup.children.length)
  nodesGroup.remove(
   nodesGroup.children[0]
  );

 while(linesGroup.children.length)
  linesGroup.remove(
   linesGroup.children[0]
  );

}


function addNode(artist,isBase){

 if(
  artist.latitude==null ||
  artist.longitude==null
 )
 return null;


 const mesh=new THREE.Mesh(
  nodeGeometry,
  new THREE.MeshBasicMaterial({
   color:isBase?0xffffff:0xcccccc
  })
 );


 const pos=latLonToVector3(
  artist.latitude,
  artist.longitude,
  1.04
 );


 mesh.position.copy(pos);
 mesh.userData=artist;

 nodesGroup.add(mesh);

 return pos;
}

function addLine(posA,posB){

 const curve=
 new THREE.QuadraticBezierCurve3(
  posA,
  posA.clone()
  .add(posB)
  .multiplyScalar(.5)
  .normalize()
  .multiplyScalar(1.25),
  posB
 );

 const line=new THREE.Line(
  new THREE.BufferGeometry()
  .setFromPoints(
   curve.getPoints(40)
  ),
  new THREE.LineBasicMaterial({
   color:0x3af2ff,
   transparent:true,
   opacity:.6
  })
 );

 linesGroup.add(line);

}

function focusArtist(){

 camera.position.set(
 0,
 0,
 2.2
 );

 controls.target.set(
 0,
 0,
 0
 );

 controls.update();

}

function showSpinner(show){

 document.getElementById("spinner")
 .style.display=
 show?"block":"none";

}

function renderArtistCard(artist){

 document.getElementById("artistCard")
 .style.display="block";

 document.getElementById("artistImage")
 .src=
 artist.image ||
 artist.image_url ||
 "";

 document.getElementById("artistName")
 .textContent=
 artist.name;

 document.getElementById("artistHometown")
 .textContent=
 artist.hometown || "";

}

function renderSidePanel(data){

 const list=
 document.getElementById("relatedList");

 list.innerHTML="";

 (data.related||[])
 .forEach(rel=>{

  const row=document.createElement("div");
  row.className="relatedRow";

const tracks=
(rel.top_tracks||[])
.slice(0,5)
.map(t=>`
<div class="track">
<img src="${t.album_image||''}">
${t.name}
</div>
`)
.join("");

  row.innerHTML=`

  <img src="${rel.image||rel.image_url||""}">

  <div>
   <div class="relName">${rel.name}</div>
   <div class="relType">${rel.rel_type||"similar"}</div>
   <div class="tracks">${tracks}</div>
  </div>

  `;

  row.onclick=()=>{
   loadArtist(rel.name);
  };

  list.appendChild(row);
 });
}

// LOAD ARTIST

async function loadArtist(name){

 if(!name)
  return;

 showSpinner(true);

 document
 .getElementById("sidePanel")
 .classList.remove("open");

 try{

  const res=
  await fetch(
   `${API_BASE_URL}/relations/${encodeURIComponent(name)}`
  );

  if(!res.ok){
   alert("Artist not found");
   return;
  }

  const data=
  await res.json();

  currentData=data;

  clearGraph();

  addNode(
 data.artist,
 true
);

  (data.related||[]).forEach(rel => {

  if(
    rel.latitude==null ||
    rel.longitude==null
  )
  return;

  const relPos = addNode(
    rel,
    false
  );

  const artistPos = latLonToVector3(
    data.artist.latitude,
    data.artist.longitude,
    1.04
  );

  if(relPos){
    addLine(
    artistPos,
    relPos
    );
  }

  });

  renderArtistCard(
   data.artist
  );

  renderSidePanel(
   data
  );

  focusArtist(
   data.artist
  );

 }
 catch(err){

  console.error(err);
  alert("Something went wrong");

 }
 finally{

  showSpinner(false);
  globeRotating=false;
 }

}


// PANEL BUTTON

document
.getElementById("viewRelatedBtn")
.onclick=()=>{

 document
 .getElementById("sidePanel")
 .classList.toggle("open");

};


// SEARCH

document
.getElementById("searchBox")
.addEventListener(
"keydown",
e=>{

 if(e.key==="Enter"){

  loadArtist(
   e.target.value.trim()
  );

 }

});


// RECENTER

document
.getElementById("recenterBtn")
.onclick=()=>{

 camera.position.set(
 0,
 0,
 3
 );

 controls.target.set(
 0,
 0,
 0
 );

 controls.update();

};


// CLICK NODES

const raycaster=
new THREE.Raycaster();

const mouse=
new THREE.Vector2();


window.addEventListener(
"click",
e=>{

 if(
 e.target.closest("#artistCard") ||
 e.target.closest("#sidePanel") ||
 e.target.closest("#search") ||
 e.target.closest("#recenterBtn")
 )
 return;


 mouse.x=
 (e.clientX/window.innerWidth)*2-1;

 mouse.y=
 -(e.clientY/window.innerHeight)*2+1;


 raycaster.setFromCamera(
  mouse,
  camera
 );


 const hits=
 raycaster.intersectObjects(
  nodesGroup.children
 );


 if(hits.length){

  const artist=
  hits[0].object.userData;

  loadArtist(
   artist.name
  );

 }

});


// ANIMATION

let globeRotating=true;

function animate(){

 requestAnimationFrame(
  animate
 );

 if(globeRotating){

  earthMesh.rotation.y+=.0008;
  countryGroup.rotation.y+=.0008;
  nodesGroup.rotation.y+=.0008;
  linesGroup.rotation.y+=.0008;

 }

 controls.update();

 renderer.render(scene,camera);

}

animate();

// RESIZE

window.addEventListener(
"resize",
()=>{

 camera.aspect=
 window.innerWidth/
 window.innerHeight;

 camera.updateProjectionMatrix();

 renderer.setSize(
  window.innerWidth,
  window.innerHeight
 );

});

// END SCRIPT

</script>
</body>
</html>
