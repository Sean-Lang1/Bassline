<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bassline Globe</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Bungee&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0704;
  --avocado:#7a8b3a;
  --gold:#c08b2e;
  --orange:#d9642a;
  --cream:#fff6e8;
  --dim:rgba(255,246,232,0.7);
  --shadow:rgba(0,0,0,0.6);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:"Baloo 2",system-ui,sans-serif;
  background:var(--bg);
  color:var(--cream);
  overflow:hidden;
}

/* ===== PSYCHEDELIC BACKGROUND (behind the canvas) ===== */
#bgLayer{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:var(--bg);
  overflow:hidden;
}
.blob{
  position:absolute;
  width:55vw; height:55vw; /* ADJUST: blob size */
  border-radius:50%;
  filter:blur(60px); /* ADJUST: blob softness */
  opacity:0.45; /* ADJUST: blob strength */
}
.blob1{ background:var(--avocado); top:-10%; left:-10%; animation: blobMove1 26s ease-in-out infinite; } /* ADJUST: speed */
.blob2{ background:var(--gold); top:20%; right:-15%; animation: blobMove2 32s ease-in-out infinite; }
.blob3{ background:var(--orange); bottom:-20%; left:20%; animation: blobMove3 20s ease-in-out infinite; }

@keyframes blobMove1{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(15vw,10vh) scale(1.2); }
}
@keyframes blobMove2{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-12vw,15vh) scale(0.9); }
}
@keyframes blobMove3{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(10vw,-12vh) scale(1.15); }
}

/* halftone dots on top of the blobs */
#bgLayer::after{
  content:"";
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,246,232,0.12) 1.5px, transparent 1.5px); /* ADJUST: dot visibility */
  background-size: 14px 14px; /* ADJUST: dot spacing */
  mix-blend-mode:overlay;
}

canvas{ position:relative; z-index:1; display:block; width:100vw; height:100vh }

/* ===== SEARCH BAR (center bottom, floating pill) ===== */
#search{
  position:absolute; left:50%; transform:translateX(-50%);
  bottom:70px; z-index:40; /* ADJUST: moved up from 36px */
  display:flex; align-items:center; gap:14px;
  padding:20px 36px; border-radius:999px; /* ADJUST: bigger padding */
  background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(0,0,0,0.35)); /* ADJUST: glassier gradient */
  border:3px solid var(--gold); /* ADJUST: thicker border */
  box-shadow: 0 10px 40px var(--shadow), 0 0 40px rgba(192,139,46,0.35);
  min-width:520px; max-width:86%; /* ADJUST: bigger overall bar */
}
#searchBox{
  background:transparent; border:none; outline:none;
  color:var(--cream); font-size:22px; font-weight:700; width:420px; /* ADJUST: bigger text */
  font-family:"Baloo 2", sans-serif;
}
#searchBox::placeholder{ color:rgba(255,246,232,0.55); }

/* ===== MINI POPUP (anchored to a clicked node) ===== */
#miniPanel{
  position:absolute; z-index:50; display:none;
  width:230px; padding:14px; border-radius:16px; /* ADJUST: popup size/roundness */
  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.3));
  border:2px solid var(--orange);
  box-shadow:0 14px 34px rgba(0,0,0,0.55);
}
#miniPanel img{
  width:100%; aspect-ratio:1/1; object-fit:cover;
  border-radius:10px; margin-bottom:8px;
  background:linear-gradient(135deg,var(--avocado),var(--gold));
}
#miniPanel .miniName{ font-family:"Bungee", sans-serif; font-size:15px; color:var(--cream); }
#miniPanel .miniRel{
  display:inline-block; margin:4px 0; padding:2px 10px; border-radius:999px;
  font-size:11px; font-weight:700; background:var(--gold); color:#1b1208;
}
#miniPanel .miniHometown{ font-size:12px; color:var(--dim); margin-bottom:8px; }
#miniPanel .miniTracks{ font-size:12px; color:var(--dim); line-height:1.5; margin-bottom:10px; }
#miniOpen{
  width:100%; padding:9px; border-radius:10px; border:none;
  background:linear-gradient(180deg,var(--gold),var(--orange));
  color:#1b1208; font-weight:800; font-family:"Baloo 2",sans-serif; cursor:pointer;
}
#miniOpen:hover{ filter:brightness(1.1); }

/* ===== RECENTER + SPINNER ===== */
#recenterBtn{
  position:absolute; right:30px; bottom:30px; z-index:40;
  width:48px; height:48px; border-radius:50%;
  border:2px solid var(--gold);
  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.25));
  color:var(--cream); font-size:20px; cursor:pointer;
}
#recenterBtn:hover{ background:var(--orange); }

#spinner{
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:46px; height:46px; border-radius:50%; z-index:60; display:none;
  border:5px solid rgba(255,246,232,0.15); border-top-color:var(--orange);
  animation:spin .8s linear infinite; /* ADJUST: spin speed */
}
@keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg) } }
</style>
</head>
<body>

<div id="bgLayer">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div id="miniPanel" aria-hidden="true"></div>

<div id="search" role="search">
  <input id="searchBox" placeholder="Search an artist..." autocomplete="off" />
</div>

<button id="recenterBtn" title="Recenter">&#8635;</button>
<div id="spinner" aria-hidden="true"></div>
<canvas id="globe"></canvas>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const API_BASE_URL = "https://backend-ivory-gamma-74.vercel.app";

// =====================
// SETUP
// =====================
const canvas = document.getElementById("globe");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.3;
controls.maxDistance = 8;
controls.rotateSpeed = 0.6;
controls.screenSpacePanning = true;
controls.mouseButtons = {
  LEFT: THREE.MOUSE.PAN,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

// =====================
// EARTH (wireframe, orange lines)
// =====================
const earthEdges = new THREE.EdgesGeometry(new THREE.SphereGeometry(1, 32, 32));
const earthMesh = new THREE.LineSegments(
  earthEdges,
  new THREE.LineBasicMaterial({ color: 0xff7a2e, transparent: true, opacity: 0.5 }) // ADJUST: wireframe color/opacity
);
scene.add(earthMesh);

function latLonToVector3(lat, lon, radius = 1) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

// =====================
// COUNTRY BORDERS (from your countries.json)
// =====================
const countryGroup = new THREE.Group();
scene.add(countryGroup);

fetch("./geojson/countries.json")
  .then((r) => r.json())
  .then((json) => {
    const mat = new THREE.LineBasicMaterial({
      color: 0xf0d9a8, // ADJUST: border line color
      transparent: true,
      opacity: 0.35     // ADJUST: border visibility
    });

    json.features.forEach((f) => {
      if (!f.geometry) return;

      let polygons = [];
      if (f.geometry.type === "Polygon") polygons = [f.geometry.coordinates];
      if (f.geometry.type === "MultiPolygon") polygons = f.geometry.coordinates;

      polygons.forEach((poly) => {
        poly.forEach((ring) => {
          const pts = ring.map((p) => latLonToVector3(p[1], p[0], 1.005));
          countryGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
        });
      });
    });
  })
  .catch((err) => console.error("Could not load countries.json", err));

// =====================
// NODES + LINES (single system — one mesh per artist, no duplicate markers)
// =====================
const nodesGroup = new THREE.Group();
scene.add(nodesGroup);

const linesGroup = new THREE.Group();
scene.add(linesGroup);

const NODE_RADIUS = 1.06; // ADJUST: how far above the surface nodes float
const nodeGeom = new THREE.SphereGeometry(0.03, 16, 16); // ADJUST: node size

function clearGraph() {
  while (nodesGroup.children.length) nodesGroup.remove(nodesGroup.children[0]);
  while (linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);
}

function addNode(artist, isBase) {
  const lat = artist.latitude != null ? Number(artist.latitude) : null;
  const lon = artist.longitude != null ? Number(artist.longitude) : null;
  if (lat == null || lon == null) return null;

  const mat = new THREE.MeshBasicMaterial({
    color: isBase ? 0xfff6e8 : 0xd9642a // ADJUST: base vs related node color
  });
  const mesh = new THREE.Mesh(nodeGeom, mat);
  const pos = latLonToVector3(lat, lon, NODE_RADIUS);
  mesh.position.copy(pos);
  mesh.userData = artist;
  nodesGroup.add(mesh);
  return pos;
}

// arcs along the outside of the sphere using spherical interpolation,
// so it can't dip through the earth no matter where the two points are
function addLine(posA, posB) {
  if (!posA || !posB) return;

  const dirA = posA.clone().normalize();
  const dirB = posB.clone().normalize();
  let dot = Math.max(-1, Math.min(1, dirA.dot(dirB)));
  const theta = Math.acos(dot);

  const segments = 32;
  const points = [];

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;

    let dir;
    if (theta < 1e-4) {
      dir = dirA.clone();
    } else {
      const a = Math.sin((1 - t) * theta) / Math.sin(theta);
      const b = Math.sin(t * theta) / Math.sin(theta);
      dir = dirA.clone().multiplyScalar(a).add(dirB.clone().multiplyScalar(b)).normalize();
    }

    const bulge = NODE_RADIUS + Math.sin(t * Math.PI) * 0.12; // ADJUST: arc height
    points.push(dir.multiplyScalar(bulge));
  }

  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({
    color: 0xc08b2e, // ADJUST: line color
    transparent: true,
    opacity: 0.8
  });
  linesGroup.add(new THREE.Line(geometry, material));
}

// =====================
// UI HELPERS
// =====================
const spinner = document.getElementById("spinner");
const searchBox = document.getElementById("searchBox");
const miniPanel = document.getElementById("miniPanel");
const recenterBtn = document.getElementById("recenterBtn");

let globeRotating = true;
let resumeTimeout = null;

function showSpinner(show) {
  spinner.style.display = show ? "block" : "none";
}

function showMiniPanelAt(screenX, screenY, artist) {
  const tracks = (artist.top_tracks || [])
    .slice(0, 5)
    .map((t) => `<div>${t.name}</div>`)
    .join("");

  miniPanel.innerHTML = `
    <img src="${artist.image || ""}" alt="" />
    <div class="miniName">${artist.name}</div>
    ${artist.rel_type ? `<div class="miniRel">${artist.rel_type}</div>` : ""}
    <div class="miniHometown">${artist.hometown || ""}</div>
    <div class="miniTracks">${tracks}</div>
    <button id="miniOpen">Open</button>
  `;

  miniPanel.style.left = `${screenX}px`;
  miniPanel.style.top = `${screenY}px`;
  miniPanel.style.display = "block";

  document.getElementById("miniOpen").addEventListener("click", () => {
    loadArtist(artist.name);
  });
}

// =====================
// CAMERA FOCUS (fly to a lat/lon)
// =====================
function focusOnLatLon(lat, lon) {
  if (lat == null || lon == null) return Promise.resolve();

  const target = latLonToVector3(Number(lat), Number(lon), NODE_RADIUS);
  const camTarget = target.clone().multiplyScalar(2.2);
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const frames = 36;
  let i = 0;

  return new Promise((resolve) => {
    function step() {
      i++;
      const t = i / frames;
      camera.position.lerpVectors(startPos, camTarget, t);
      controls.target.lerpVectors(startTarget, target, t);
      controls.update();
      if (i < frames) requestAnimationFrame(step);
      else resolve();
    }
    step();
  });
}

// =====================
// FETCH WITH TIMEOUT
// =====================
async function fetchWithTimeout(url, timeout = 15000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return res;
  } catch (err) {
    clearTimeout(timer);
    throw err;
  }
}

// =====================
// LOAD ARTIST
// =====================
async function loadArtist(name) {
  if (!name) return;

  showSpinner(true);
  globeRotating = false;
  miniPanel.style.display = "none";
  if (resumeTimeout) { clearTimeout(resumeTimeout); resumeTimeout = null; }

  try {
    const res = await fetchWithTimeout(`${API_BASE_URL}/relations/${encodeURIComponent(name)}`);

    if (!res.ok) {
      alert("Artist not found.");
      return;
    }

    const data = await res.json();
    clearGraph();

    const basePos = addNode(data.artist, true);

    data.related.forEach((rel) => {
      const relPos = addNode(rel, false);
      if (basePos && relPos) addLine(basePos, relPos);
    });

    await focusOnLatLon(data.artist.latitude, data.artist.longitude);

    resumeTimeout = setTimeout(() => {
      globeRotating = true;
      resumeTimeout = null;
    }, 3000);
  } catch (err) {
    if (err.name === "AbortError") alert("Request timed out. Try again.");
    else alert("Something went wrong.");
    console.error(err);
  } finally {
    showSpinner(false);
  }
}

// =====================
// SEARCH
// =====================
searchBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter") loadArtist(e.target.value.trim());
});

// =====================
// RECENTER
// =====================
recenterBtn.addEventListener("click", () => {
  camera.position.set(0, 0, 3);
  controls.target.set(0, 0, 0);
  controls.update();
  globeRotating = true;
});

// =====================
// CLICK HANDLING (raycast onto nodes only)
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (e) => {
  if (e.target.closest("#miniPanel") || e.target.closest("#search") || e.target.closest("#recenterBtn")) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodesGroup.children);

  if (hits.length === 0) {
    miniPanel.style.display = "none";
    return;
  }

  const artist = hits[0].object.userData;
  const screen = hits[0].point.clone().project(camera);
  const sx = (screen.x * 0.5 + 0.5) * window.innerWidth;
  const sy = (-screen.y * 0.5 + 0.5) * window.innerHeight;

  showMiniPanelAt(sx + 12, sy - 12, artist);
});

// =====================
// ANIMATION LOOP
// =====================
function animate() {
  requestAnimationFrame(animate);

  if (globeRotating) {
    earthMesh.rotation.y += 0.0008; // ADJUST: auto-rotation speed
    countryGroup.rotation.y += 0.0008;
    nodesGroup.rotation.y += 0.0008;
    linesGroup.rotation.y += 0.0008;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
