<style>
:root{
  --bg:#040302;
  --avocado:#7a8b3a;
  --gold:#c08b2e;
  --orange:#d9642a;
  --cream:#fff6e8;
  --lime:#a8e05f;
  --dim:rgba(255,246,232,0.7);
  --shadow:rgba(0,0,0,0.6);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:"Outfit",system-ui,sans-serif;
  background:var(--bg);
  color:var(--cream);
  overflow:hidden;
}

/* ===== FUNKY 70'S TYPE BACKGROUND ===== */
#bgLayer{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:var(--bg);
  overflow:hidden;
}
.blob{
  position:absolute;
  width:45vw; height:45vw;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.18;
}
.blob1{ background:var(--avocado); top:-10%; left:-10%; animation: blobMove1 26s ease-in-out infinite; }
.blob2{ background:var(--gold); top:20%; right:-15%; animation: blobMove2 32s ease-in-out infinite; }
.blob3{ background:var(--orange); bottom:-20%; left:20%; animation: blobMove3 20s ease-in-out infinite; }

.dot{
  position:absolute;
  border-radius:50%;
  filter:blur(20px);
  opacity:0.25;
}
.dot1{ width:8vw; height:8vw; background:var(--lime); top:15%; left:60%; animation: dotBounce1 7s ease-in-out infinite; }
.dot2{ width:5vw; height:5vw; background:var(--gold); top:60%; left:15%; animation: dotBounce2 5.5s ease-in-out infinite; }
.dot3{ width:6vw; height:6vw; background:var(--orange); top:70%; left:75%; animation: dotBounce3 6.5s ease-in-out infinite; }
.dot4{ width:4vw; height:4vw; background:var(--avocado); top:35%; left:35%; animation: dotBounce1 8s ease-in-out infinite reverse; }

@keyframes dotBounce1{
  0%,100%{ transform:translateY(0) scale(1); }
  50%{ transform:translateY(-6vh) scale(1.15); }
}
@keyframes dotBounce2{
  0%,100%{ transform:translateY(0) scale(1); }
  50%{ transform:translateY(5vh) scale(0.85); }
}
@keyframes dotBounce3{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-3vw,-4vh) scale(1.2); }
}

@keyframes blobMove1{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(15vw,10vh) scale(1.2); }
}
@keyframes blobMove2{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-12vw,15vh) scale(0.9); }
}
@keyframes blobMove3{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(10vw,-12vh) scale(1.15); }
}

#bgLayer::after{
  content:"";
  position:absolute; inset:-50%;
  background-image:
    radial-gradient(rgba(255,246,232,0.18) 1.5px, transparent 1.5px),
    radial-gradient(rgba(217,100,42,0.10) 3px, transparent 3px);
  background-size: 12px 12px, 34px 34px;
  background-position: 0 0, 8px 12px;
  transform: rotate(-12deg);
  mix-blend-mode:overlay;
}

canvas{ position:relative; z-index:1; display:block; width:100vw; height:100vh }

/* ===== SEARCH BAR ===== */
#search{
  position:absolute; left:50%; transform:translateX(-50%);
  bottom:70px; z-index:40;
  display:flex; align-items:center; gap:12px;
  padding:14px 26px; border-radius:999px;
  background: rgba(255,246,232,0.06);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border:2px solid rgba(192,139,46,0.7);
  box-shadow: 0 8px 30px var(--shadow), 0 0 24px rgba(192,139,46,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
  min-width:400px; max-width:86%;
  animation:searchEnter .7s cubic-bezier(.2,1.4,.4,1);
}
@keyframes searchEnter{
  from{
    opacity:0;
    transform:translateX(-50%) translateX(-80px);
  }
  to{
    opacity:1;
    transform:translateX(-50%) translateX(0);
  }
}
#searchBox{
  background:transparent; border:none; outline:none;
  color:var(--cream); font-size:19px; font-weight:600; width:320px;
  font-family:"Geist Pixel","Bungee",sans-serif;
}
#searchBox::placeholder{ color:rgba(255,246,232,0.5); }

/* ===== ARTIST MINI PANEL ===== */
#miniPanel{
  position:absolute; z-index:50; display:none;
  width:520px; padding:14px; border-radius:16px;
  background:
    linear-gradient(rgba(20,14,8,0.72), rgba(20,14,8,0.72)) padding-box,
    linear-gradient(135deg, var(--lime), var(--gold), var(--orange)) border-box;
  border:3px solid transparent;
  backdrop-filter: blur(14px) saturate(130%);
  -webkit-backdrop-filter: blur(14px) saturate(130%);
  box-shadow:0 14px 34px rgba(0,0,0,0.55);
    opacity:0;
  transform:translateY(15px) scale(0.96);
  transition:opacity .25s ease, transform .25s ease;
}
#miniPanel.show{
  opacity:1;
  transform:translateY(0) scale(1);
}
.panelBody{
  display:flex; gap:14px; align-items:flex-start;
}
.panelBody img.artistImg{
  width:200px; height:200px; object-fit:cover;

  margin-top:12px;

}
.panelInfo{ flex:1; min-width:0; }
.miniName{ font-family:"Bungee",sans-serif; font-size:20px; color:var(--cream); }
.miniRel{
  display:inline-block; margin:4px 0; padding:2px 10px; border-radius:999px;
  font-size:11px; font-weight:700; background:var(--gold); color:#1b1208;
  cursor:pointer;
}
.miniRel:hover{ filter:brightness(1.15); }
.tracksHeading{

}
.miniHometown{ font-size:12px; font-style:italic; color:var(--dim); margin-bottom:6px; }
.miniBio{
  font-size:11px; color:var(--dim); margin-bottom:8px; line-height:1.4;

}
.miniBio:hover{

}
.trackRow{

}
.trackRow img{
  width:26px; height:26px; border-radius:5px; object-fit:cover; flex-shrink:0;
  background:#2b2010;
  cursor: pointer;
  transition: transform 0.15s ease;
}
.trackRow img:hover {
  transform:translateX(5px);
  color:var(--cream);
}
.trackRow span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#viewRelatedBtn{
  display:block; margin:12px auto 0 auto; padding:9px 22px; border-radius:10px; border:none;
  background:linear-gradient(180deg,var(--gold),var(--cream));
  color:white; font-weight:400; font-size:14px;
  font-family:"Bungee",sans-serif; cursor:pointer;
  text-shadow:0 2px 4px rgba(0,0,0,0.45);
}
.albumWrap{
  position:relative;
  width:26px;
  height:26px;
  flex-shrink:0;
}
.albumWrap img{
  width:26px;
  height:26px;
  border-radius:5px;
  object-fit:cover;
}
.playBtn{
  position:absolute;
  inset:0;
  border:none;
  border-radius:5px;
  background:rgba(0,0,0,0.65);
  color:white;
  font-size:12px;
  opacity:0;
  cursor:pointer;
  transition:opacity .15s ease, transform .15s ease;
}
.albumWrap:hover .playBtn{
  opacity:1;
  transform:scale(1.05);
}
#viewRelatedBtn:hover{ filter:brightness(1.1); }

/* ===== RE-CENTER & GLOBE SPINNER ===== */
#recenterBtn{
  position:absolute; right:30px; bottom:30px; z-index:40;
  width:48px; height:48px; border-radius:50%;
  border:2px solid var(--gold);
  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.25));
  color:var(--cream); font-size:20px; cursor:pointer;
}
#recenterBtn:hover{ background:var(--orange); }

#spinner{
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);

  border:5px solid rgba(255,246,232,0.15); border-top-color:var(--orange);
  animation:spin .8s linear infinite, fadeIn .5s ease;
}
@keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg) } }
@keyframes fadeIn{ from{ opacity:0 } to{ opacity:1 } }

#loadingText{
  position:absolute; left:50%; top:calc(50% + 30px); transform:translateX(-50%);
  z-index:60; display:none;
  font-size:17px; font-weight:700; color:var(--dim);
  font-family:"Bungee",sans-serif;
  animation:fadeIn .5s ease;
}

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const API_BASE_URL = "https://backend-ivory-gamma-74.vercel.app";

// =====================
// SETUP
// =====================
const canvas = document.getElementById("globe");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.3;
controls.maxDistance = 8;
controls.rotateSpeed = 0.6;
controls.screenSpacePanning = true;
controls.mouseButtons = {
  LEFT: THREE.MOUSE.PAN,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

// =====================
// STARS
// =====================
const starsGeometry = new THREE.BufferGeometry();
const starPositions = [];
while (starPositions.length < 3500 * 3) {
  const x = (Math.random() - 0.5) * 24;
  const y = (Math.random() - 0.5) * 24;
  const z = (Math.random() - 0.5) * 24;
  if (Math.sqrt(x * x + y * y + z * z) > 3) {
    starPositions.push(x, y, z);
  }
}
starsGeometry.setAttribute("position", new THREE.Float32BufferAttribute(starPositions, 3));
scene.add(new THREE.Points(
  starsGeometry,
  new THREE.PointsMaterial({ color: 0xfff6e8, size: 0.03, transparent: true, opacity: 0.65 })
));

// =====================
// 3D WIREFRAME GLOBE
// =====================
const globeGroup = new THREE.Group();
scene.add(globeGroup);

const earthCore = new THREE.Mesh(
  new THREE.SphereGeometry(0.995, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 })
);
globeGroup.add(earthCore);

const earthEdges = new THREE.EdgesGeometry(new THREE.SphereGeometry(1, 32, 32));
const earthMesh = new THREE.LineSegments(
  earthEdges,
  new THREE.LineBasicMaterial({ color: 0xff7a2e, transparent: true, opacity: 0.35 })
);
globeGroup.add(earthMesh);

function latLonToVector3(lat, lon, radius = 1) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

// =====================
// COUNTRY BORDERS
// =====================
fetch("./geojson/countries.json")
  .then((r) => r.json())
  .then((json) => {
    const mat = new THREE.LineBasicMaterial({
      color: 0xffd58a,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    json.features.forEach((f) => {
      if (!f.geometry) return;

      let polygons = [];
      if (f.geometry.type === "Polygon") polygons = [f.geometry.coordinates];
      if (f.geometry.type === "MultiPolygon") polygons = f.geometry.coordinates;

      polygons.forEach((poly) => {
        poly.forEach((ring) => {
          const pts = ring.map((p) => latLonToVector3(p[1], p[0], 1.005));
          globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
        });
      });
    });
  })
  .catch((err) => console.error("Could not load countries.json", err));

// =====================
// NODES + LINES (previous node/line generations gray out + animations)
// =====================
const nodesGroup = new THREE.Group();
globeGroup.add(nodesGroup);

const linesGroup = new THREE.Group();
globeGroup.add(linesGroup);

const NODE_RADIUS = 1.02;
const nodeGeom = new THREE.SphereGeometry(0.012, 16, 16);
const baseNodeGeom = new THREE.SphereGeometry(0.019, 16, 16);
const nodesById = new Map();
const coordCounts = new Map();
let generation = 0;

function clearGraph() {
  while (nodesGroup.children.length) nodesGroup.remove(nodesGroup.children[0]);
  while (linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);
  nodesById.clear();
  coordCounts.clear();
  generation = 0;
}

function dimOlderGenerations() {
  [...nodesGroup.children, ...linesGroup.children].forEach((obj) => {
    if (!obj.userData.rel_type) return;

    const age = generation - obj.userData.gen;
    if (age > 0) {
      const dimFactor = Math.max(0.1, 1 - age * 0.45);
      obj.material.color.lerp(new THREE.Color(0x666666), 0.55);
      obj.userData.targetOpacity = obj.userData.baseOpacity * dimFactor;
    }
  });
}

const REL_COLORS = {
  "similar": 0xd9932e,
  "collaboration": 0xd9932e,
  "member of band": 0xd9932e,
  "married": 0x7a4a6b,
  "discovered": 0x5c7a6a,
  "discovered by": 0x5c7a6a,
  "sibling": 0xb2402e
};
const BASE_NODE_COLOR = 0x8fae4a;

function addNode(artist) {
  let lat = artist.latitude != null ? Number(artist.latitude) : null;
  let lon = artist.longitude != null ? Number(artist.longitude) : null;
  if (lat == null || lon == null) return null;

  const id = artist.spotify_id || artist.id;
  if (nodesById.has(id)) return nodesById.get(id).position.clone();

  const coordKey = `${lat.toFixed(2)},${lon.toFixed(2)}`;
  const collisions = coordCounts.get(coordKey) || 0;
  coordCounts.set(coordKey, collisions + 1);

  if (collisions > 0) {
    const angle = collisions * 2.4;
    const ring = 0.8 + 0.25 * collisions;
    lat += ring * Math.sin(angle);
    lon += ring * Math.cos(angle);
  }

  const mat = new THREE.MeshBasicMaterial({
    color: artist.rel_type ? (REL_COLORS[artist.rel_type] || BASE_NODE_COLOR) : BASE_NODE_COLOR,
    transparent: true,
    opacity: 0
  });
  const mesh = new THREE.Mesh(artist.rel_type ? nodeGeom : baseNodeGeom, mat);
  const pos = latLonToVector3(lat, lon, NODE_RADIUS);
  mesh.position.copy(pos);
  mesh.userData = { ...artist, gen: generation, baseOpacity: 0.6, targetOpacity: 0.6 };
  nodesGroup.add(mesh);
  nodesById.set(id, mesh);
  return pos;
}

function addLine(posA, posB, relType) {
  if (!posA || !posB) return;

  const dirA = posA.clone().normalize();
  const dirB = posB.clone().normalize();
  let dot = Math.max(-1, Math.min(1, dirA.dot(dirB)));
  const theta = Math.acos(dot);

  const segments = 32;
  const dirs = [];

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;

    let dir;
    if (theta < 1e-4) {
      dir = dirA.clone();
    } else {
      const a = Math.sin((1 - t) * theta) / Math.sin(theta);
      const b = Math.sin(t * theta) / Math.sin(theta);
      dir = dirA.clone().multiplyScalar(a).add(dirB.clone().multiplyScalar(b)).normalize();
    }
    dirs.push(dir);
  }

  const points = dirs.map((dir, i) => {
    const t = i / segments;
    return dir.clone().multiplyScalar(NODE_RADIUS + Math.sin(t * Math.PI) * 0.05);
  });

  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({
    color: REL_COLORS[relType] || 0xd9932e,
    transparent: true,
    opacity: 0.8
  });
  const line = new THREE.Line(geometry, material);
  line.geometry.setDrawRange(0, 0);
  line.userData = {
    gen: generation, baseOpacity: 0.8, targetOpacity: 0.8,
    rel_type: relType || "similar",
    drawProgress: 0, totalPoints: points.length,
    dirs: dirs, phase: Math.random() * Math.PI * 2
  };
  linesGroup.add(line);
}

// =====================
// LINE ANIMATIONS
// =====================
function animateGraph(time) {
  linesGroup.children.forEach((line) => {
    if (line.userData.drawProgress < line.userData.totalPoints) {
      line.userData.drawProgress += 1.2;
      line.geometry.setDrawRange(0, Math.floor(line.userData.drawProgress));
    }

    const { dirs, phase } = line.userData;
    const posAttr = line.geometry.attributes.position;
    const wobble = Math.sin(time * 0.0018 + phase) * 0.012;
    for (let i = 0; i < dirs.length; i++) {
      const t = i / (dirs.length - 1);
      const bulge = NODE_RADIUS + Math.sin(t * Math.PI) * (0.05 + wobble);
      posAttr.setXYZ(i, dirs[i].x * bulge, dirs[i].y * bulge, dirs[i].z * bulge);
    }
    posAttr.needsUpdate = true;
  });

  [...nodesGroup.children, ...linesGroup.children].forEach((obj) => {
    const target = obj.userData.targetOpacity ?? 0.6;
    if (Math.abs(obj.material.opacity - target) > 0.01) {
      obj.material.opacity += (target - obj.material.opacity) * 0.08;
    }
  });
}

// =====================
// UI HELPERS
// =====================
const spinner = document.getElementById("spinner");
const loadingText = document.getElementById("loadingText");
const searchBox = document.getElementById("searchBox");
const miniPanel = document.getElementById("miniPanel");
const recenterBtn = document.getElementById("recenterBtn");

let globeRotating = true;
let loadingInterval = null;

const LOADING_MESSAGES = [
  "Building music map...",
  "Finding collaborations...",
  "Following the sound...",
  "Adding connections..."
];

function showSpinner(show) {
  spinner.style.display = show ? "block" : "none";
  loadingText.style.display = show ? "block" : "none";

  if (loadingInterval) { clearInterval(loadingInterval); loadingInterval = null; }

  if (show) {
    let idx = 0;
    loadingText.textContent = LOADING_MESSAGES[0];
    loadingInterval = setInterval(() => {
      idx = (idx + 1) % LOADING_MESSAGES.length;
      loadingText.textContent = LOADING_MESSAGES[idx];
    }, 4000);
  }
}

let currentBaseName = "";
let currentBaseId = null;

function showArtistPanel(screenX, screenY, artist) {
  const tracks = (artist.top_tracks || [])
    .slice(0, 5)
    .map((t) => `
      <div class="trackRow">
        <div class="albumWrap">
          <img src="${t.album_image || ""}" alt="" />
          <button class="playBtn" data-track="${t.spotify_id}">▶</button>
        </div>
        <span>${t.name}</span>
      </div>
    `)
    .join("");

  miniPanel.innerHTML = `
    <div class="panelBody">
      <img class="artistImg" src="${artist.image || ""}" alt="" />
      <div class="panelInfo">
        <div class="miniName">${artist.name}</div>
        ${artist.rel_type ? `<div class="miniRel" id="relTag">${artist.rel_type}</div>` : ""}
        <div class="miniHometown">${artist.hometown || ""}</div>
        <div class="miniListeners">
        ${artist.listeners.toLocaleString()} listeners
        </div>
        ${artist.summary ? `<div class="miniBio">${artist.summary}</div>` : ""}
        ${tracks ? `<div class="tracksHeading">Popular Tracks</div>` : ""}
        ${tracks}
      </div>
    </div>
    <button id="viewRelatedBtn">View Related Artists</button>
  `;

  const panelW = 520;
  const clampedX = Math.min(screenX, window.innerWidth - panelW - 20);
  miniPanel.style.left = `${Math.max(10, clampedX)}px`;
  miniPanel.style.top = `${Math.max(10, screenY)}px`;
  miniPanel.style.display = "block";

  requestAnimationFrame(()=>{
    miniPanel.classList.add("show");
  });

  document.getElementById("viewRelatedBtn").addEventListener("click", () => {
    loadRelations(artist.name);
  });

  const relTag = document.getElementById("relTag");
  if (relTag && artist.base_id && nodesById.has(artist.base_id)) {
    relTag.addEventListener("click", async () => {
      const baseMesh = nodesById.get(artist.base_id);
      const baseWorld = baseMesh.getWorldPosition(new THREE.Vector3());
      hidePanel();
      await flyCameraTo(baseWorld, 2.2, easeOutBack);
      const screen = screenPosOf(baseMesh.getWorldPosition(new THREE.Vector3()));
      showArtistPanel(screen.x + 24, screen.y - 40, baseMesh.userData);
    });
  }
}

document.addEventListener("click", (e)=>{
  const btn = e.target.closest(".playBtn");
  if(!btn) return;

  const id = btn.dataset.track;

  window.open(
    `https://open.spotify.com/track/${id}`,
    "_blank"
  );
});

function hidePanel() {
  miniPanel.classList.remove("show");
  setTimeout(()=> {
    miniPanel.style.display = "none";
  },250);
  globeRotating = true;
}

// =====================
// CAMERA FOCUS (origined globe rotation)
// =====================
const Y_AXIS = new THREE.Vector3(0, 1, 0);
const ROT_SPEED = 0.0008;

function worldPosOf(lat, lon) {
  const local = latLonToVector3(Number(lat), Number(lon), NODE_RADIUS);
  return local.applyAxisAngle(Y_AXIS, globeGroup.rotation.y);
}

function easeInOutQuad(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function flyCameraTo(direction, distance, easingFn = easeInOutQuad, frames = 40) {
  const endPos = direction.clone().normalize().multiplyScalar(distance);
  const startPos = camera.position.clone();
  let i = 0;

  return new Promise((resolve) => {
    function step() {
      i++;
      const t = easingFn(i / frames);
      camera.position.lerpVectors(startPos, endPos, t);
      controls.update();
      if (i < frames) requestAnimationFrame(step);
      else resolve();
    }
    step();
  });
}

function focusOnLatLon(lat, lon) {
  if (lat == null || lon == null) return Promise.resolve();
  return flyCameraTo(worldPosOf(lat, lon), 2.2, easeOutBack, 160);
}

// =====================
// LOADING AESTHETIC PULSE
// =====================
let pulsing = false;

function startPulse() {
  pulsing = true;
  const baseDir = camera.position.clone().normalize();
  const baseDist = camera.position.length();
  const start = performance.now();

  function step() {
    if (!pulsing) return;
    const elapsed = (performance.now() - start) / 1000;
    const pulse = Math.sin(elapsed * 1.6) * 0.35;
    camera.position.copy(baseDir.clone().multiplyScalar(baseDist + pulse));
    controls.update();
    requestAnimationFrame(step);
  }
  step();
}

function stopPulse() {
  pulsing = false;
}

function screenPosOf(worldPos) {
  const p = worldPos.clone().project(camera);
  return {
    x: (p.x * 0.5 + 0.5) * window.innerWidth,
    y: (-p.y * 0.5 + 0.5) * window.innerHeight
  };
}

// =====================
// FETCH W/ TIMEOUT
// =====================
async function fetchWithTimeout(url, timeout = 90000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return res;
  } catch (err) {
    clearTimeout(timer);
    throw err;
  }
}

// =====================
// SEARCH -> PROFILE ONLY 
// =====================
async function loadProfile(name) {
  if (!name) return;

  showSpinner(true);
  hidePanel();

  const wideDir = camera.position.clone().normalize();
  await flyCameraTo(wideDir, 5.5);
  startPulse();

  try {
    const res = await fetchWithTimeout(`${API_BASE_URL}/profile/${encodeURIComponent(name)}`, 45000);

    stopPulse();

    if (!res.ok) {
      alert("Artist not found.");
      return;
    }

    const artist = await res.json();
    currentBaseName = artist.name;
    currentBaseId = artist.spotify_id || artist.id;

    clearGraph();

    const pos = addNode(artist);
    if (!pos) {
      alert("Who??");
      return;
    }

    await focusOnLatLon(artist.latitude, artist.longitude);

    const screen = screenPosOf(worldPosOf(artist.latitude, artist.longitude));
    showArtistPanel(screen.x + 24, screen.y - 40, artist);
  } catch (err) {
    stopPulse();
    globeRotating = true;
    if (err.name === "AbortError") alert("Request timed out. Try again.");
    else alert("Something went wrong.");
    console.error(err);
  } finally {
    showSpinner(false);
  }
}

// =====================
// VIEW RELATED -> RELATIONS
// =====================
async function loadRelations(name) {
  showSpinner(true);
  hidePanel();

  const wideDir = camera.position.clone().normalize();
  await flyCameraTo(wideDir, 5.5);
  startPulse();

  try {
    const res = await fetchWithTimeout(`${API_BASE_URL}/relations/${encodeURIComponent(name)}`);

    stopPulse();

    if (!res.ok) {
      alert("Could not load related artists.");
      return;
    }

    const data = await res.json();
    currentBaseName = data.artist.name;
    currentBaseId = data.artist.spotify_id || data.artist.id;

    generation += 1;
    dimOlderGenerations();

    const basePos = addNode(data.artist) ||
      (nodesById.get(data.artist.id) && nodesById.get(data.artist.id).position.clone());

    const baseMesh = nodesById.get(currentBaseId);
    if (baseMesh && baseMesh.userData.rel_type) {
      baseMesh.scale.setScalar(1.6);
      baseMesh.userData.targetOpacity = baseMesh.userData.baseOpacity;
    }

    const clusterSum = basePos ? basePos.clone() : new THREE.Vector3();

    data.related.forEach((rel) => {
      rel.base_id = currentBaseId;
      const relPos = addNode(rel);
      if (basePos && relPos) {
        addLine(basePos, relPos, rel.rel_type);
        clusterSum.add(relPos);
      }
    });

    if (clusterSum.lengthSq() > 0) {
      const clusterDir = clusterSum.applyAxisAngle(Y_AXIS, globeGroup.rotation.y).normalize();
      clusterDir.y -= 0.3;
      await flyCameraTo(clusterDir, 3.0, easeOutBack, 64);
    }

    globeRotating = true;
  } catch (err) {
    stopPulse();
    globeRotating = true;
    if (err.name === "AbortError") alert("Request timed out. Try again.");
    else alert("Something went wrong.");
    console.error(err);
  } finally {
    showSpinner(false);
  }
}

// =====================
// SEARCH INPUT
// =====================
searchBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter") loadProfile(e.target.value.trim());
});

// =====================
// RE-CENTER
// =====================
recenterBtn.addEventListener("click", () => {
  const usPos = worldPosOf(39.8283, -98.5795).normalize().multiplyScalar(3);
  camera.position.copy(usPos);
  controls.target.set(0, 0, 0);
  controls.update();
  hidePanel();
});

// =====================
// CLICK HANDLING
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (e) => {
  if (e.target.closest("#miniPanel") || e.target.closest("#search") || e.target.closest("#recenterBtn")) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodesGroup.children);

  if (hits.length === 0) {
    hidePanel();
    return;
  }

  const artist = hits[0].object.userData;
  const screen = screenPosOf(hits[0].object.getWorldPosition(new THREE.Vector3()));
  showArtistPanel(screen.x + 24, screen.y - 40, artist);
});

// =====================
// ANIMATION LOOP
// =====================
function animate(time) {
  requestAnimationFrame(animate);

  if (globeRotating) {
    globeGroup.rotation.y += ROT_SPEED;

    if (nodesGroup.children.length > 0) {
      camera.position.applyAxisAngle(Y_AXIS, ROT_SPEED);
    }
  }

globeGroup.rotation.x = Math.max(
  -Math.PI / 2,
  Math.min(Math.PI / 2, globeGroup.rotation.x)
);

  animateGraph(time || 0);
  controls.update();
  renderer.render(scene, camera);
}
animate(0);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
