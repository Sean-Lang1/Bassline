<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bassline Globe</title>
    <style>
      body { margin: 0; overflow: hidden; background: #050814; font-family: Arial, sans-serif; }

      /* ADJUST: overall accent color used across buttons/borders/highlights */
      :root {
        --accent: #ff2d78;
        --accent-glow: rgba(255, 45, 120, 0.4);
        --panel-bg: rgba(10, 8, 20, 0.92);
        --text-main: #f5f5ff;
        --text-dim: #a9a9c4;
      }

      /* ===== SEARCH BAR (center bottom, floating pill) ===== */
      #search {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 22px;
        border-radius: 999px; /* ADJUST: pill roundness */
        background: var(--panel-bg);
        border: 1px solid var(--accent-glow);
        box-shadow: 0 0 20px var(--accent-glow); /* ADJUST: glow intensity */
      }
      #searchBox {
        background: transparent;
        border: none;
        color: var(--text-main);
        outline: none;
        font-size: 15px;
        width: 240px; /* ADJUST: search box width */
      }

      /* ===== ARTIST CARD (main searched/selected artist) ===== */
      #artistCard {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 280px; /* ADJUST: card width */
        padding: 16px;
        border-radius: 16px;
        background: var(--panel-bg);
        border: 1px solid var(--accent-glow);
        color: var(--text-main);
        display: none; /* shown once an artist loads */
      }
      #artistCard img {
        width: 100%;
        aspect-ratio: 1 / 1; /* keeps it square, like album art */
        object-fit: cover;
        border-radius: 12px; /* ADJUST: album art corner roundness */
        margin-bottom: 10px;
      }
      #artistCard h2 {
        margin: 0 0 4px 0;
        font-size: 18px;
      }
      #artistCard .hometown {
        color: var(--text-dim);
        font-size: 13px;
        margin-bottom: 12px;
      }
      #viewRelatedBtn {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: var(--accent); /* ADJUST: button color */
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
      #viewRelatedBtn:hover {
        filter: brightness(1.15);
      }

      /* ===== SIDE PANEL (related artists, slides in from right) ===== */
      #sidePanel {
        position: absolute;
        top: 0;
        right: -360px; /* hidden off-screen by default */
        width: 340px;
        height: 100%;
        background: var(--panel-bg);
        border-left: 1px solid var(--accent-glow);
        color: var(--text-main);
        overflow-y: auto;
        transition: right 0.3s ease; /* ADJUST: slide speed */
        padding: 16px;
        box-sizing: border-box;
      }
      #sidePanel.open {
        right: 0;
      }
      #sidePanel h3 {
        margin-top: 0;
      }
      .relatedRow {
        display: flex;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.04); /* ADJUST: row background */
        cursor: pointer;
      }
      .relatedRow:hover {
        background: rgba(255, 255, 255, 0.09);
      }
      .relatedRow img {
        width: 56px;
        height: 56px;
        object-fit: cover;
        border-radius: 8px;
        flex-shrink: 0;
      }
      .relatedRow .relName {
        font-weight: bold;
        font-size: 14px;
      }
      .relatedRow .relType {
        display: inline-block;
        margin-top: 2px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        background: var(--accent); /* ADJUST: relationship badge color */
        color: white;
      }
      .relatedRow .tracks {
        margin-top: 6px;
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.4;
      }

      /* ===== RECENTER BUTTON ===== */
      #recenterBtn {
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid var(--accent-glow);
        background: var(--panel-bg);
        color: var(--text-main);
        font-size: 18px;
        cursor: pointer;
      }
      #recenterBtn:hover {
        background: var(--accent);
      }

      /* ===== LOADING SPINNER ===== */
      #spinner {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        margin: -20px 0 0 -20px;
        border: 4px solid var(--accent-glow);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite; /* ADJUST: spin speed */
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="artistCard">
      <img id="artistImage" src="" alt="" />
      <h2 id="artistName"></h2>
      <div class="hometown" id="artistHometown"></div>
      <button id="viewRelatedBtn">View Related Artists</button>
    </div>

    <div id="sidePanel">
      <h3>Related Artists</h3>
      <div id="relatedList"></div>
    </div>

    <div id="search">
      <input id="searchBox" type="text" placeholder="Search an artist..." />
    </div>

    <button id="recenterBtn" title="Recenter">&#8635;</button>
    <div id="spinner"></div>

    <canvas id="globe"></canvas>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const API_BASE_URL = "https://backend-ivory-gamma-74.vercel.app";

      // =====================
      // SETUP
      // =====================
      const canvas = document.getElementById("globe");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050814);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 0, 3); // ADJUST: lower = closer/bigger starting view

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 1.3; // ADJUST: how far you can zoom in
      controls.maxDistance = 8;   // ADJUST: how far you can zoom out

      const light = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(light);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 3, 5);
      scene.add(dirLight);

      // =====================
      // EARTH (wireframe)
      // =====================
      const earthGeometry = new THREE.SphereGeometry(1, 32, 32);
      const earthEdges = new THREE.EdgesGeometry(earthGeometry);
      const earthMaterial = new THREE.LineBasicMaterial({
        color: 0x3af2ff, // ADJUST: globe wireframe color
        transparent: true,
        opacity: 0.4
      });
      const earthMesh = new THREE.LineSegments(earthEdges, earthMaterial);
      scene.add(earthMesh);

      // =====================
      // COORDINATE CONVERSION
      // =====================
      function latLonToVector3(lat, lon, radius = 1.01) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const x = -radius * Math.sin(phi) * Math.cos(theta);
        const z = radius * Math.sin(phi) * Math.sin(theta);
        const y = radius * Math.cos(phi);
        return new THREE.Vector3(x, y, z);
      }


      // =====================
      // NODES + LINES
      // =====================
      const nodesGroup = new THREE.Group();
      scene.add(nodesGroup);

      const linesGroup = new THREE.Group();
      scene.add(linesGroup);

      const nodeGeometry = new THREE.SphereGeometry(0.02, 16, 16); // ADJUST: node size

      function clearGraph() {
        while (nodesGroup.children.length) nodesGroup.remove(nodesGroup.children[0]);
        while (linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);
      }

      function addNode(artist, isBase) {
        const lat = artist.latitude != null ? artist.latitude : 0;
        const lon = (artist.longitude != null ? artist.longitude : 0);

        const material = new THREE.MeshBasicMaterial({
          color: isBase ? 0xff2d78 : 0x3af2ff, // ADJUST: base vs related node colors
          transparent: true,
          opacity: 0
        });

        const mesh = new THREE.Mesh(nodeGeometry, material);
        const pos = latLonToVector3(lat, lon);
        mesh.position.copy(pos);
        mesh.userData = artist;
        nodesGroup.add(mesh);
        return pos;
      }

      function addLine(posA, posB) {
        const geometry = new THREE.BufferGeometry().setFromPoints([posA, posB]);
        const material = new THREE.LineBasicMaterial({
          color: 0x3af2ff, // ADJUST: connecting line color
          transparent: true,
          opacity: 0
        });
        const line = new THREE.Line(geometry, material);
        linesGroup.add(line);
      }

      // node fade-in
      function fadeInGraph() {
        [...nodesGroup.children, ...linesGroup.children].forEach((obj) => {
          if (obj.material.opacity < 1) {
            obj.material.opacity = Math.min(obj.material.opacity + 0.03, 1);
          }
        });
      }

      // =====================
      // UI HELPERS (artist card + side panel + spinner)
      // =====================
      let currentData = null; // holds the last successfully loaded artist + related list

      function showSpinner(show) {
        document.getElementById("spinner").style.display = show ? "block" : "none";
      }

      function renderArtistCard(artist) {
        document.getElementById("artistCard").style.display = "block";
        document.getElementById("artistImage").src = artist.image || "";
        document.getElementById("artistName").textContent = artist.name;
        document.getElementById("artistHometown").textContent = artist.hometown || "";
      }

      function renderSidePanel(data) {
        const list = document.getElementById("relatedList");
        list.innerHTML = "";

        data.related.forEach((rel) => {
          const row = document.createElement("div");
          row.className = "relatedRow";

          const trackNames = (rel.top_tracks || [])
            .slice(0, 5)
            .map((t) => t.name)
            .join("<br/>");

          row.innerHTML = `
            <img src="${rel.image || ""}" alt="" />
            <div>
              <div class="relName">${rel.name}</div>
              <div class="relType">${rel.rel_type}</div>
              <div class="tracks">${trackNames}</div>
            </div>
          `;

          row.addEventListener("click", () => {
            loadArtist(rel.name);
          });

          list.appendChild(row);
        });
      }

      document.getElementById("viewRelatedBtn").addEventListener("click", () => {
        document.getElementById("sidePanel").classList.toggle("open");
      });

      // =====================
      // LOAD ARTIST DATA
      // =====================
      async function loadArtist(name) {
        showSpinner(true);
        document.getElementById("sidePanel").classList.remove("open");

        try {
          const res = await fetch(`${API_BASE_URL}/relations/${encodeURIComponent(name)}`);

          if (!res.ok) {
            showSpinner(false);
            alert("Artist not found.");
            return;
          }

          const data = await res.json();
          currentData = data;
          clearGraph();

          const basePos = addNode(data.artist, true);

          data.related.forEach((rel) => {
            const relPos = addNode(rel, false);
            addLine(basePos, relPos);
          });

          renderArtistCard(data.artist);
          renderSidePanel(data);
        } catch (err) {
          alert("Something went wrong. Try again.");
          console.error(err);
        } finally {
          showSpinner(false);
        }
      }

      // =====================
      // SEARCH
      // =====================
      document.getElementById("searchBox").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          loadArtist(e.target.value.trim());
        }
      });

      // =====================
      // RECENTER
      // =====================
      document.getElementById("recenterBtn").addEventListener("click", () => {
        camera.position.set(0, 0, 3);
        controls.target.set(0, 0, 0);
        controls.update();
      });

      // =====================
      // CLICK HANDLING (clicking a node on the globe itself)
      // =====================
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      let clickOnCooldown = false;
      const CLICK_COOLDOWN_MS = 1500; // ADJUST: delay before jumping to a clicked node

      function onClick(event) {
        if (clickOnCooldown) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(nodesGroup.children);

        if (hits.length === 0) return;

        clickOnCooldown = true;

        const artist = hits[0].object.userData;

        renderArtistCard(artist);

        setTimeout(() => {
          loadArtist(artist.name);
          clickOnCooldown = false;
        }, CLICK_COOLDOWN_MS);
      }

      window.addEventListener("click", onClick);

      // =====================
      // ANIMATION LOOP
      // =====================
      function animate() {
        requestAnimationFrame(animate);
        earthMesh.rotation.y += 0.0008; // ADJUST: auto-rotation speed
        fadeInGraph();
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
