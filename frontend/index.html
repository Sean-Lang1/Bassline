<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bassline Globe</title>
    <style>
      body { margin: 0; overflow: hidden; background: #050814; }
      #info {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 260px;
        padding: 10px;
        background: rgba(5, 8, 20, 0.9);
        color: #e5f7ff;
        font-family: Arial, sans-serif;
        border-radius: 8px;
        border: 1px solid rgba(58, 242, 255, 0.3);
      }
      #search {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(58, 242, 255, 0.3);
        background: rgba(5, 8, 20, 0.9);
        color: #e5f7ff;
        font-family: Arial, sans-serif;
      }
      #search input {
        background: transparent;
        border: none;
        color: #e5f7ff;
        outline: none;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="search">
      <input id="searchBox" type="text" placeholder="Search an artist..." />
    </div>
    <div id="info">Search an artist to begin.</div>
    <canvas id="globe"></canvas>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const API_BASE_URL = "https://backend-ivory-gamma-74.vercel.app";

      // =====================
      // SETUP
      // =====================
      const canvas = document.getElementById("globe");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050814);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 0, 4);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      const light = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(light);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 3, 5);
      scene.add(dirLight);

      // =====================
      // EARTH (wireframe)
      // =====================
      const earthGeometry = new THREE.SphereGeometry(1, 32, 32);
      const earthEdges = new THREE.EdgesGeometry(earthGeometry);
      const earthMaterial = new THREE.LineBasicMaterial({
        color: 0x3af2ff,
        transparent: true,
        opacity: 0.4
      });
      const earthMesh = new THREE.LineSegments(earthEdges, earthMaterial);
      scene.add(earthMesh);

      // =====================
      // COORDINATE CONVERSION
      // =====================
      function latLonToVector3(lat, lon, radius = 1.01) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const x = -radius * Math.sin(phi) * Math.cos(theta);
        const z = radius * Math.sin(phi) * Math.sin(theta);
        const y = radius * Math.cos(phi);
        return new THREE.Vector3(x, y, z);
      }


      // =====================
      // NODES + LINES
      // =====================
      const nodesGroup = new THREE.Group();
      scene.add(nodesGroup);

      const linesGroup = new THREE.Group();
      scene.add(linesGroup);

      const nodeGeometry = new THREE.SphereGeometry(0.02, 16, 16);

      function clearGraph() {
        while (nodesGroup.children.length) nodesGroup.remove(nodesGroup.children[0]);
        while (linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);
      }

      function addNode(artist, isBase) {
        const lat = artist.latitude != null ? artist.latitude : 0;
        const lon = (artist.longitude != null ? artist.longitude : 0);

        const material = new THREE.MeshBasicMaterial({
          color: isBase ? 0xff3a6e : 0x3af2ff,
          transparent: true,
          opacity: 0
        });

        const mesh = new THREE.Mesh(nodeGeometry, material);
        const pos = latLonToVector3(lat, lon);
        mesh.position.copy(pos);
        mesh.userData = artist;
        nodesGroup.add(mesh);
        return pos;
      }

      function addLine(posA, posB) {
        const geometry = new THREE.BufferGeometry().setFromPoints([posA, posB]);
        const material = new THREE.LineBasicMaterial({
          color: 0x3af2ff,
          transparent: true,
          opacity: 0
        });
        const line = new THREE.Line(geometry, material);
        linesGroup.add(line);
      }

      // node fade-in
      function fadeInGraph() {
        [...nodesGroup.children, ...linesGroup.children].forEach((obj) => {
          if (obj.material.opacity < 1) {
            obj.material.opacity = Math.min(obj.material.opacity + 0.03, 1);
          }
        });
      }

      // =====================
      // LOAD ARTIST DATA
      // =====================
      async function loadArtist(name) {
        document.getElementById("info").innerHTML = "Loading...";

        try {
          const res = await fetch(`${API_BASE_URL}/relations/${encodeURIComponent(name)}`);

          if (!res.ok) {
            document.getElementById("info").innerHTML = "Artist not found.";
            return;
          }

          const data = await res.json();
          clearGraph();

          const basePos = addNode(data.artist, true);

          data.related.forEach((rel) => {
            const relPos = addNode(rel, false);
            addLine(basePos, relPos);
          });

          document.getElementById("info").innerHTML = `
            <strong>${data.artist.name}</strong><br/>
            ${data.artist.hometown || ""}<br/>
            Click a related node to explore further.
          `;
        } catch (err) {
          document.getElementById("info").innerHTML = "Something went wrong. Try again.";
          console.error(err);
        }
      }

      // =====================
      // SEARCH
      // =====================
      document.getElementById("searchBox").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          loadArtist(e.target.value.trim());
        }
      });

      // =====================
      // CLICK HANDLING
      // =====================
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      let clickOnCooldown = false;
      const CLICK_COOLDOWN_MS = 1500;

      function onClick(event) {
        if (clickOnCooldown) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(nodesGroup.children);

        if (hits.length === 0) return;

        clickOnCooldown = true;

        const artist = hits[0].object.userData;

        document.getElementById("info").innerHTML = `
          <strong>${artist.name}</strong><br/>
          ${artist.rel_type ? artist.rel_type + "<br/>" : ""}
        `;

        setTimeout(() => {
          loadArtist(artist.name);
          clickOnCooldown = false;
        }, CLICK_COOLDOWN_MS);
      }

      window.addEventListener("click", onClick);

      // =====================
      // ANIMATION LOOP
      // =====================
      function animate() {
        requestAnimationFrame(animate);
        earthMesh.rotation.y += 0.0008;
        fadeInGraph();
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
